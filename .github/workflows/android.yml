name: Android & Windows CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Cache Gradle Wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build Android Debug APK
      run: ./gradlew assembleDebug

    - name: Build Windows Desktop Installers (MSI & EXE)
      run: ./gradlew :desktop:packageMsi :desktop:packageExe

    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Windows MSI
      uses: actions/upload-artifact@v4
      with:
        name: xdyl-windows-msi
        path: desktop/build/compose/binaries/main/msi/*.msi

    - name: Upload Windows EXE
      uses: actions/upload-artifact@v4
      with:
        name: xdyl-windows-exe
        path: desktop/build/compose/binaries/main/exe/*.exe
