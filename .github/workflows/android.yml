name: Android & Windows CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Cache Gradle Wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    - name: Build Android Debug APK
      run: ./gradlew assembleDebug
    - name: Upload Android APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/app-debug.apk

  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Cache Gradle Wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-
    - name: Create self-signed certificate
      run: |
        openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=UNSA Studio/O=xdyl"
        openssl pkcs12 -export -in cert.pem -inkey key.pem -out certificate.pfx -passout pass:xdyl123
      shell: bash
    - name: Build Windows MSI
      run: ./gradlew :desktop:packageMsi
      shell: bash
    - name: Sign MSI with self-signed certificate
      run: |
        $msi = Get-ChildItem -Path "desktop/build/compose/binaries/main/msi" -Filter *.msi | Select-Object -First 1
        if ($msi) {
          & signtool sign /fd SHA256 /f certificate.pfx /p xdyl123 $msi.FullName
        }
      shell: powershell
    - name: Upload Windows MSI
      uses: actions/upload-artifact@v4
      with:
        name: xdyl-windows-msi
        path: desktop/build/compose/binaries/main/msi/*.msi
