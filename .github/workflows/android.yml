# 修订后的 windows 作业片段（仅显示 windows 部分，android 部分不变）
  windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    - name: Cache Gradle Wrapper
      uses: actions/cache@v4
      with:
        path: ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-wrapper-${{ hashFiles('gradle/wrapper/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-wrapper-
    - name: Create self-signed certificate
      run: |
        # 生成自签名证书，密码为 xdyl123
        openssl req -x509 -newkey rsa:2048 -keyout key.pem -out cert.pem -days 365 -nodes -subj "/CN=UNSA Studio/O=xdyl"
        openssl pkcs12 -export -in cert.pem -inkey key.pem -out certificate.pfx -passout pass:xdyl123
      shell: bash
    - name: Build Windows MSI
      run: ./gradlew :desktop:packageMsi
      shell: bash
    - name: Sign MSI with self-signed certificate
      run: |
        # 找到生成的 msi 文件
        $msi = Get-ChildItem -Path "desktop/build/compose/binaries/main/msi" -Filter *.msi | Select-Object -First 1
        if ($msi) {
          & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.19041.0\x64\signtool.exe" sign /fd SHA256 /f certificate.pfx /p xdyl123 $msi.FullName
        }
      shell: powershell
    - name: Upload Windows MSI
      uses: actions/upload-artifact@v4
      with:
        name: xdyl-windows-msi
        path: desktop/build/compose/binaries/main/msi/*.msi
